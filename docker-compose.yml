version: "3.8"

services:
  dllm-core:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.core
    ports:
      - "11400:11400"
    volumes:
      - ./data/models:/models
      - ./data/config:/config
      - ./data/logs:/logs
    environment:
      - DLLM_CONFIG_PATH=/config/settings.toml
      - DLLM_MODEL_DIR=/models
      - RUST_LOG=info
      - VLLM_URL=http://vllm:8000
    depends_on:
      - vllm
    networks:
      - dllm-net
    restart: unless-stopped

  vllm:
    image: vllm/vllm-openai:latest
    runtime: nvidia
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - GPU_MEMORY_UTILIZATION=0.80
      - MAX_MODEL_LEN=32768
      - MAX_NUM_SEQS=8
    volumes:
      - ./data/models:/models
    mem_limit: 96g
    networks:
      - dllm-net
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

networks:
  dllm-net:
    driver: bridge
